name: NASDAQ Bot
on:
  schedule:
    - cron: '*/5 * * * *' # Burayı 5 dakika olacak şekilde güncelledik
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Kütüphaneleri Yükle
        run: pip install finvizfinance pandas requests yfinance
      - name: Botu Çalıştır
        run: python bot.py
